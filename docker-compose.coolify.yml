# Coolify deployment (Docker Compose resource type). Coolify scans this file for its
# "magic" environment variables and substitutes generated values at deploy time —
# nothing here needs to be filled in by hand in Coolify's UI:
#   - SERVICE_FQDN_<NAME>_<PORT>   declares that a domain should be generated and
#                                  routed (through Coolify's proxy) to <NAME> on <PORT>.
#                                  Must be a bare key (no value) for Coolify to pick it
#                                  up and configure routing, not just substitute text.
#   - SERVICE_USER_<NAME> / SERVICE_PASSWORD_<NAME>
#                                  random credentials, generated once and persisted
#                                  across redeploys.
# See https://coolify.io/docs/knowledge-base/environment-variables.
#
# Git sync (P1): set GIT_REMOTE_URL in Coolify's environment UI to clone/push a remote
# vault repo into vault-data at boot (see .env.example for the HTTPS + token format).
# Without it, the server still git-inits /data/vault locally — notes persist in the
# vault-data volume, but nothing is pushed to GitHub.
#
# P2 auth/workspaces env is wired here ahead of full feature rollout so deployment
# shape does not need another compose change later.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_WEB_3000
      - VAULT_PATH=/data/vault
      - GIT_REMOTE_URL=${GIT_REMOTE_URL:-}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      - WORKSPACES_ROOT=/data/workspaces
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/fluffmind
    volumes:
      - vault-data:/data/vault
      - workspaces-data:/data/workspaces
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: fluffmind
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  vault-data:
  workspaces-data:
  postgres-data:
