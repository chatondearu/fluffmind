# Portable solo package (PRD-032) — zip/tar with embedded Node + Nitro output.
name: Release portable

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to build (current host matrix uses all)'
        required: false
        default: all
        type: choice
        options:
          - all
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - win-x64
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-24.04
            target: linux-x64
          - os: windows-2022
            target: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Skip target if filtered
        id: should
        shell: bash
        run: |
          WANT="${{ github.event.inputs.target || 'all' }}"
          if [[ "$WANT" == "all" || "$WANT" == "${{ matrix.target }}" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build portable package
        if: steps.should.outputs.run == 'true'
        shell: bash
        run: node scripts/package-portable.mjs --target "${{ matrix.target }}"

      - name: Upload artifact
        if: steps.should.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fluffmind-${{ matrix.target }}
          path: |
            dist/portable/fluffmind-${{ matrix.target }}.*
            dist/portable/SHA256SUMS
          if-no-files-found: error

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name 'SHA256SUMS' \) -exec cp {} release-assets/ \;
          cd release-assets
          # Merge SHA256SUMS if multiple
          if ls SHA256SUMS* 1>/dev/null 2>&1; then
            cat SHA256SUMS* | sort -u > SHA256SUMS.merged
            mv SHA256SUMS.merged SHA256SUMS
          fi
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
