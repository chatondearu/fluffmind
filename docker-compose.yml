# Local development stack. `pnpm install && pnpm dev` directly on the host is still
# the fastest inner loop (instant HMR, no container overhead) — this exists for a
# consistent, no-local-Node-required path, and to develop against a real Postgres
# without installing it on the host.
#
# Usage: copy .env.example to .env (set VAULT_PATH to a real markdown vault, e.g. this
# Foam vault), then `docker compose up`.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: pnpm --filter @fluffmind/web dev
    ports:
      - '3000:3000'
    environment:
      VAULT_PATH: /vault
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      WORKSPACES_ROOT: /data/workspaces
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-fluffmind}:${POSTGRES_PASSWORD:-fluffmind}@postgres:5432/${POSTGRES_DB:-fluffmind}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: '3000'
    volumes:
      - .:/app
      # Read-write since P1: writeToWorkspace commits (and optionally pushes) here.
      - ${VAULT_PATH}:/vault
      # P2 workspace root (one directory per organization id).
      - workspaces-data:/data/workspaces
      # Anonymous volumes so the image's own (Linux-native) node_modules aren't
      # shadowed by the bind mount above — needed for every workspace package since
      # pnpm installs a node_modules per package, not just at the repo root.
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.nuxt
      - /app/packages/design-system/node_modules
      - /app/packages/editor-blocks/node_modules
      - /app/packages/integrations/node_modules
      - /app/packages/db/node_modules
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluffmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluffmind}
      POSTGRES_DB: ${POSTGRES_DB:-fluffmind}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  workspaces-data:
